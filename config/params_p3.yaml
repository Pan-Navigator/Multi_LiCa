/**:
  ros__parameters:
    # P3 calibration config — 2-lidar: front (reference) + rear_top (source)
    # Source bag: calibration_p3_data_20260401_153511
    # TF mapping: rslidarfront = front_top, rslidarback = rear_top

    frame_count: 1
    runs_count: 5

    use_fitness_based_calibration: false

    lidar_topics: [/lidar/front_top/rslidar_points, /lidar/rear_top/rslidar_points]
    tf_topic: /tf_static
    visualize: true
    read_tf_from_table: true
    table_degrees: true

    # Initial transforms from URDF (xyz swapped — URDF had positions reversed)
    rslidarfronttop: [1.312, 0.44, 0.345, 0.0, 0.0, -135.0]
    rslidarreartop: [-1.312, -0.44, 0.345, 0.0, 0.0, 44.69]

    read_pcds_from_file: true
    pcd_directory: /../data/pcds_p3/

    base_to_ground_z: 0.17864325963808905

    target_frame_id: rslidarfronttop
    base_frame_id: base_link
    calibrate_target: false
    calibrate_to_base: true

    output_dir: /../output/p3/
    results_file: results_p3.txt

    # GICP parameters
    max_corresp_dist: 0.3
    max_rotation_deg: 50.0
    rel_fitness: 1.0e-6
    rel_rmse: 1.0e-6
    max_iterations: 200
    epsilon: 0.0001
    voxel_size: 0.05
    remove_ground_flag: false
    fitness_score_threshold: 0.05

    # RANSAC parameters
    distance_threshold: 0.1
    ransac_n: 10
    num_iterations: 2000
    r_voxel_size: 0.1
    r_runs: 10
