/**:
  ros__parameters:
    # Four-lidar calibration config
    # Source bag: calibrate_four_lidars_20260325_110306
    # 4 LiDARs: front (reference), back, left, right

    frame_count: 1
    runs_count: 5

    use_fitness_based_calibration: false

    lidar_topics: [/lidar/front/rslidar_points, /lidar/back/rslidar_points, /lidar/left/rslidar_points, /lidar/right/rslidar_points]
    tf_topic: /tf_static
    visualize: true
    read_tf_from_table: true
    table_degrees: true

    # Initial transforms from bag /tf_static
    rslidarfront: [1.2732816336455675, -0.48711512445294547, 0.32685055473131763, -0.316, 0.272, -46.852]
    rslidarback: [-1.352701754397057, 0.4068831529299437, 0.3456740974555309, 0.306, -0.283, 135.199]
    rslidarleft: [0.0, 0.4445, 0.217, 0.0, -1.0, 0.0]
    rslidarright: [0.0, -0.4445, 0.217, 0.0, 1.5, 0.0]

    read_pcds_from_file: true
    pcd_directory: /../data/pcds_four/

    base_to_ground_z: 0.17864325963808905

    target_frame_id: rslidarfront
    base_frame_id: base_link
    calibrate_target: false
    calibrate_to_base: true

    output_dir: /../output/four/
    results_file: results_four.txt

    # GICP parameters
    max_corresp_dist: 0.3
    max_rotation_deg: 10.0
    rel_fitness: 1.0e-6
    rel_rmse: 1.0e-6
    max_iterations: 200
    epsilon: 0.0001
    voxel_size: 0.05
    remove_ground_flag: false
    fitness_score_threshold: 0.3

    # RANSAC parameters
    distance_threshold: 0.1
    ransac_n: 10
    num_iterations: 2000
    r_voxel_size: 0.1
    r_runs: 10
